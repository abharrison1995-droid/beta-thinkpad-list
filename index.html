<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Technician Console</title>
    <style>
        :root {
            --bg-base: #0d1117;
            --bg-surface: #161b22;
            --bg-card: #21262d;
            --border-muted: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --tp-red: #da291c;
            --tp-red-hover: #ff473d;
            --badge-green: #238636;
            --badge-orange: #d29922;
            --badge-red: #da3633;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navbar */
        header { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-muted); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--tp-red); }
        
        .controls { display: flex; gap: 1rem; align-items: center; }
        .search-bar { background: var(--bg-base); border: 1px solid var(--border-muted); color: var(--text-main); padding: 0.5rem 1rem; border-radius: 6px; width: 250px; outline: none; transition: border 0.2s; }
        .search-bar:focus { border-color: var(--tp-red); }
        
        .series-filters button { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-muted); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; margin-left: 0.5rem; }
        .series-filters button:hover { color: var(--text-main); border-color: var(--text-muted); }
        .series-filters button.active { background-color: rgba(218, 41, 28, 0.1); color: var(--tp-red); border-color: var(--tp-red); }

        /* Layout */
        main { display: flex; flex: 1; overflow: hidden; }
        aside { width: 280px; background-color: var(--bg-surface); border-right: 1px solid var(--border-muted); overflow-y: auto; display: flex; flex-direction: column; }
        
        .model-btn { background: transparent; color: var(--text-main); border: none; border-bottom: 1px solid var(--border-muted); padding: 1rem 1.5rem; text-align: left; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: background 0.1s; display: flex; justify-content: space-between; align-items: center; }
        .model-btn:hover { background-color: var(--bg-card); }
        .model-btn.active { background-color: var(--bg-card); border-left: 4px solid var(--tp-red); color: #fff; }

        .content-area { flex: 1; padding: 2rem; overflow-y: auto; background-color: var(--bg-base); }
        
        /* Dashboard Cards */
        .dashboard-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border-muted); padding-bottom: 1rem; }
        .dashboard-header h2 { font-size: 2.5rem; color: #fff; letter-spacing: -1px; }
        
        .badge-group { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .b-cpu { background: rgba(56, 139, 253, 0.1); color: #58a6ff; border: 1px solid rgba(56, 139, 253, 0.4); }
        .b-ram { background: rgba(210, 153, 34, 0.1); color: #e3b341; border: 1px solid rgba(210, 153, 34, 0.4); }
        .b-fw { background: rgba(35, 134, 54, 0.1); color: #3fb950; border: 1px solid rgba(35, 134, 54, 0.4); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }
        
        .card { background: var(--bg-surface); border: 1px solid var(--border-muted); border-radius: 8px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; color: #fff; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid var(--border-muted); padding-bottom: 0.5rem; }
        .card-header svg { fill: var(--text-muted); width: 20px; height: 20px; }
        
        ul.tech-list { list-style: none; }
        ul.tech-list li { margin-bottom: 0.75rem; padding-left: 1.5rem; position: relative; font-size: 0.95rem; color: var(--text-main); line-height: 1.4; }
        ul.tech-list li::before { content: "›"; color: var(--tp-red); position: absolute; left: 0; font-size: 1.2rem; font-weight: bold; top: -2px; }
        
        .alert-box { background: rgba(218, 41, 28, 0.1); border-left: 4px solid var(--tp-red); padding: 1rem; border-radius: 0 6px 6px 0; margin-top: 1rem; font-size: 0.9rem; }
        .alert-box strong { color: #fff; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-muted); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <div class="logo">ThinkPad<span>Refurb</span>DB</div>
        <div class="controls">
            <input type="text" id="search" class="search-bar" placeholder="Search models, parts, FRU..." onkeyup="handleSearch()">
            <div class="series-filters">
                <button id="btn-t" class="active" onclick="setSeries('T')">T-Series</button>
                <button id="btn-x" onclick="setSeries('X')">X-Series</button>
                <button id="btn-w" onclick="setSeries('W')">W/P-Series</button>
            </div>
        </div>
    </header>

    <main>
        <aside id="model-list"></aside>
        <section class="content-area" id="detail-view">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                Select a model or search to begin.
            </div>
        </section>
    </main>

    <script>
        // Icons embedded as SVG strings to maintain zero-dependencies
        const icons = {
            hw: `<svg viewBox="0 0 24 24"><path d="M2 4h20v16H2V4zm2 2v12h16V6H4zm3 2h2v2H7V8zm0 4h2v2H7v-2zm4-4h6v2h-6V8zm0 4h6v2h-6v-2z"/></svg>`,
            fw: `<svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18-.21 0-.41-.06-.57-.18l-7.9-4.44A.991.991 0 0 1 3 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18.21 0 .41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9zM12 4.15L6.04 7.5 12 10.85l5.96-3.35L12 4.15zM5 15.91l6 3.38v-6.71L5 9.21v6.7zM19 9.21l-6 3.38v6.71l6-3.38v-6.7z"/></svg>`,
            parts: `<svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>`,
            os: `<svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>`
        };

        const db = {
            "T": [
                {
                    id: "t480", name: "T480", tags: ["14-inch", "Quad-Core", "DDR4"],
                    specs: ["Intel 8th Gen Core (Quad-Core)", "14.0-inch HD/FHD/WQHD eDP", "Dual Drive: M.2 2242 + 2.5 SATA (via adapter FRU)"],
                    refurb: "2 Slots (Max 64GB DDR4). Excellent margins for refurb. Retains the Power Bridge battery system (Internal + External hot-swap).",
                    parts: ["External batteries share with T470, T570, T580.", "Internal 2.5 caddies fit T470 native."],
                    firmware: ["Coreboot supported (requires hardware SPI flasher/clip to bypass BootGuard).", "Intel ME can be neutralized but not fully removed (requires FSP blobs).", "CRITICAL: Thunderbolt firmware bug destroys NVM chip if not updated immediately upon receiving."],
                    os: ["Plex/Homelab Hero: Low idle power, easily handles multiple Docker containers 24/7.", "Flawless Linux Mint / Debian support out of the box."]
                },
                {
                    id: "t480s", name: "T480s", tags: ["14-inch", "Slim", "NVMe"],
                    specs: ["Intel 8th Gen Core (Quad-Core)", "14.0-inch FHD/WQHD eDP", "M.2 2280 NVMe PCIe 3.0 x4 natively"],
                    refurb: "1 Slot + 4/8GB Soldered (Max 40GB DDR4). Single internal battery (no external bridge).",
                    parts: ["Display panels and M.2 brackets share with standard T480.", "Keyboards and internal batteries DO NOT fit T480."],
                    firmware: ["Coreboot support via hardware flashing.", "Requires the same urgent Thunderbolt firmware patch as the T480."],
                    os: ["Excellent headless server node. Runs Ubuntu Server exceptionally well with low thermals."]
                },
                {
                    id: "t440p", name: "T440p", tags: ["14-inch", "Socketed", "DDR3L"],
                    specs: ["Intel 4th Gen Core (M/MQ Socketed)", "14.0-inch HD/HD+/FHD", "2.5-inch SATA III + M.2 2242"],
                    refurb: "2 Slots (Max 16GB DDR3L). Refurbisher goldmine: CPU is fully socketed allowing highly profitable i7 Quad-Core upgrades.",
                    parts: ["Trackpad assembly native swap with T450 (removes the clunkpad).", "Optical bay accepts standard 9.5mm caddy."],
                    firmware: ["Coreboot fully supported.", "Hardware flash required for Wi-Fi whitelist removal."],
                    os: ["Very strong Linux daily driver. Thermals require good paste (e.g., PTM7950) if upgraded to 4700MQ."]
                },
                {
                    id: "t430", name: "T430", tags: ["14-inch", "Socketed", "Ivy Bridge"],
                    specs: ["Intel 3rd Gen Core (M Socketed)", "14.0-inch HD/HD+", "2.5-inch SATA III + mSATA"],
                    refurb: "2 Slots (Max 16GB DDR3/DDR3L). Handles both 1.5V and 1.35V RAM. Socketed CPU allows quad-core mods (beware thermal limits).",
                    parts: ["Keyboards swap natively with T530, W530, X230.", "Accepts 90W/65W round barrel AC adapters."],
                    firmware: ["1vyrain software exploit unlocks advanced BIOS settings easily.", "Coreboot/Skulls supported.", "EC firmware flash required to map classic 7-row keyboard mod."],
                    os: ["Rock solid under AntiX or Debian for lightweight duties."]
                }
            ],
            "X": [
                {
                    id: "x280", name: "X280", tags: ["12.5-inch", "Soldered", "NVMe"],
                    specs: ["Intel 8th Gen Core", "12.5-inch FHD IPS", "M.2 2280 NVMe"],
                    refurb: "0 Slots. ALL RAM IS SOLDERED (8GB or 16GB fixed). Verify RAM before purchasing job lots. No Power Bridge.",
                    parts: ["Shares almost no mechanical parts with X270 or prior.", "Requires proprietary dongle for RJ45."],
                    firmware: ["Locked down. Advanced mods require direct SPI hardware flash.", "Thunderbolt update mandatory."],
                    os: ["Great portable Linux terminal machine, provided it has 16GB RAM."]
                },
                {
                    id: "x240", name: "X240", tags: ["12.5-inch", "Clunkpad", "DDR3L"],
                    specs: ["Intel 4th Gen Core", "12.5-inch HD/FHD eDP", "Single 2.5-inch internal bay"],
                    refurb: "1 Slot (Max 8GB DDR3L). Must use 1.35V RAM. CRITICAL FAULT: Uses a unique CR1632 CMOS battery coin cell, standard CR2032 will not fit.",
                    parts: ["Power bridge batteries match X250, X260, X270.", "Trackpad can (and should) be upgraded to X250 module."],
                    firmware: ["Advanced configurations require hardware programmer chip dump."],
                    os: ["Good lightweight Mint machine, but 8GB RAM ceiling limits virtualization."]
                },
                {
                    id: "x230t", name: "X230T (Tablet)", tags: ["12.5-inch", "Convertible", "Digitizer"],
                    specs: ["Intel 3rd Gen Core", "12.5-inch IPS Touch/Digitizer", "7mm 2.5-inch SATA III"],
                    refurb: "2 Slots (Max 16GB). Distinct convertible framework. Watch for broken center hinge swivels on auction units.",
                    parts: ["Shares chiclet keyboard with T430/X230.", "WARNING: Screens, hinges, and digitizers DO NOT fit standard X230."],
                    firmware: ["1vyrain software deployment frees Wi-Fi restrictions.", "EC modification allows 3rd party battery charging."],
                    os: ["Wacom digitizer works out-of-the-box on most modern Linux kernels (Mint/Ubuntu)."]
                },
                {
                    id: "x200", name: "X200", tags: ["12.1-inch", "16:10", "Libreboot"],
                    specs: ["Intel Core 2 Duo", "12.1-inch 16:10 Widescreen", "2.5-inch SATA II"],
                    refurb: "2 Slots (Max 8GB DDR3). CRITICAL FAULT: Demands strict low-density (2Rx8) memory sticks. High-density RAM will fail post.",
                    parts: ["Keyboards match X201 and X201s."],
                    firmware: ["The absolute gold standard for Libreboot.", "Requires hardware SOIC-8 clip and Raspberry Pi Pico / CH341a for initial flash."],
                    os: ["Perfect for fully free/open-source GNU/Linux distributions. Avoid heavy web browsing."]
                }
            ],
            "W": [
                {
                    id: "w510", name: "W510", tags: ["15.6-inch", "Workstation", "Quad-Core"],
                    specs: ["Intel 1st Gen Core i7 (Quad-Core)", "15.6-inch FHD RGBLED options", "Nvidia Quadro FX 880M"],
                    refurb: "4 Slots (Max 32GB DDR3). Quad-core models unlock all 4 slots. Requires 135W minimum AC adapter to boost.",
                    parts: ["Chassis and keyboard heavily shared with T510."],
                    firmware: ["Hardware programmer required for whitelist removals."],
                    os: ["Legacy Nvidia drivers can be problematic on modern Linux. Nouveau drivers recommended for 2D tasks."]
                }
            ]
        };

        let currentSeries = 'T';
        let allModels = [];
        
        // Flatten DB for search
        Object.keys(db).forEach(key => {
            db[key].forEach(model => allModels.push({...model, series: key}));
        });

        function setSeries(series) {
            currentSeries = series;
            document.getElementById('search').value = '';
            document.querySelectorAll('.series-filters button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${series.toLowerCase()}`).classList.add('active');
            renderList(db[series]);
        }

        function handleSearch() {
            const query = document.getElementById('search').value.toLowerCase();
            if (!query) return setSeries(currentSeries);
            
            document.querySelectorAll('.series-filters button').forEach(b => b.classList.remove('active'));
            const results = allModels.filter(m => 
                m.name.toLowerCase().includes(query) || 
                m.parts.join(' ').toLowerCase().includes(query) ||
                m.refurb.toLowerCase().includes(query)
            );
            renderList(results);
        }

        function renderList(models) {
            const list = document.getElementById('model-list');
            list.innerHTML = '';
            models.forEach(model => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.innerHTML = `${model.name} <span style="color: var(--text-muted); font-size: 0.8rem;">${model.tags[0]}</span>`;
                btn.onclick = (e) => {
                    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderDetails(model);
                };
                list.appendChild(btn);
            });
        }

        function renderDetails(model) {
            const html = `
                <div class="dashboard-header">
                    <div>
                        <h2>${model.name}</h2>
                        <div class="badge-group">
                            <span class="badge b-cpu">${model.tags[1]}</span>
                            <span class="badge b-ram">${model.tags[2]}</span>
                        </div>
                    </div>
                </div>

                <div class="grid-container">
                    
                    <div class="card">
                        <div class="card-header">${icons.hw} Core Specs & Refurb Margins</div>
                        <ul class="tech-list">
                            ${model.specs.map(s => `<li>${s}</li>`).join('')}
                        </ul>
                        <div class="alert-box">
                            <strong>Technician Note:</strong> ${model.refurb}
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">${icons.parts} Hardware & FRU Interchange</div>
                        <ul class="tech-list">
                            ${model.parts.map(p => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="card">
                        <div class="card-header">${icons.fw} Firmware & BIOS Operations</div>
                        <ul class="tech-list">
                            ${model.firmware.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="card">
                        <div class="card-header">${icons.os} OS & Homelab Viability</div>
                        <ul class="tech-list">
                            ${model.os.map(o => `<li>${o}</li>`).join('')}
                        </ul>
                    </div>

                </div>
            `;
            document.getElementById('detail-view').innerHTML = html;
        }

        // Init
        setSeries('T');
    </script>
</body>
</html>
