<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Refurbishment Reference Explorer</title>
    <style>
        :root {
            --bg-base: #121212;
            --bg-surface: #1e1e1e;
            --bg-panel: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-red: #da291c;
            --border-color: #333;
            --diff-low: #4caf50;
            --diff-med: #ff9800;
            --diff-high: #f44336;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-base); color: var(--text-main); line-height: 1.5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background-color: var(--bg-surface); border-bottom: 2px solid var(--accent-red); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.25rem; font-weight: 600; }
        
        .series-filters button { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 0.5rem 1.5rem; margin-left: 0.5rem; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .series-filters button:hover { color: var(--text-main); border-color: var(--text-muted); }
        .series-filters button.active { background-color: var(--accent-red); color: #fff; border-color: var(--accent-red); }

        main { display: flex; flex: 1; overflow: hidden; }
        
        aside { width: 260px; background-color: var(--bg-surface); border-right: 1px solid var(--border-color); overflow-y: auto; display: flex; flex-direction: column; }
        .model-btn { background: transparent; color: var(--text-main); border: none; border-bottom: 1px solid var(--border-color); padding: 1rem; text-align: left; cursor: pointer; font-size: 1rem; transition: background 0.1s; }
        .model-btn:hover { background-color: var(--bg-panel); }
        .model-btn.active { background-color: var(--bg-panel); border-left: 4px solid var(--accent-red); font-weight: bold; }

        .content-area { flex: 1; padding: 2rem; overflow-y: auto; background-color: var(--bg-base); }
        .placeholder { display: flex; height: 100%; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.2rem; }
        
        .details-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; max-width: 900px; margin: 0 auto; }
        .detail-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 6px; padding: 1.5rem; }
        .detail-card h3 { color: var(--accent-red); margin-bottom: 1rem; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        .model-title { font-size: 2rem; margin-bottom: 1.5rem; color: #fff; }

        ul { list-style-type: none; }
        li { margin-bottom: 0.75rem; padding-left: 1.25rem; position: relative; }
        li::before { content: "▪"; color: var(--accent-red); position: absolute; left: 0; top: 0px; font-size: 1.2rem; }
        
        .quirk { background-color: rgba(218, 41, 28, 0.1); border-left: 3px solid var(--accent-red); padding: 0.75rem; margin-top: 1rem; border-radius: 0 4px 4px 0; }
        .tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 3px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-left: 0.5rem; }
        .tag-low { background-color: rgba(76, 175, 80, 0.2); color: var(--diff-low); border: 1px solid var(--diff-low); }
        .tag-med { background-color: rgba(255, 152, 0, 0.2); color: var(--diff-med); border: 1px solid var(--diff-med); }
        .tag-high { background-color: rgba(244, 67, 54, 0.2); color: var(--diff-high); border: 1px solid var(--diff-high); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>

        let currentSeries = 'T';
        let currentModel = null;

        function setSeries(series) {
            currentSeries = series;
            currentModel = null;
            
            document.getElementById('btn-t').classList.toggle('active', series === 'T');
            document.getElementById('btn-x').classList.toggle('active', series === 'X');
            document.getElementById('btn-w').classList.toggle('active', series === 'W');
            
            renderList();
            document.getElementById('detail-view').innerHTML = '<div class="placeholder">Select a model from the list to view specifications.</div>';
        }

        function getDiffTag(diff) {
            const classMap = { 'Low': 'tag-low', 'Med': 'tag-med', 'High': 'tag-high' };
            return `<span class="tag ${classMap[diff]}">${diff}</span>`;
        }

        function renderDetails(modelId) {
            const model = inventoryData[currentSeries].find(m => m.id === modelId);
            currentModel = modelId;
            renderList();

            const html = `
                <h2 class="model-title">${model.name}</h2>
                <div class="details-grid">
                    <div class="detail-card">
                        <h3>Core Architecture</h3>
                        <ul>${model.specs.map(s => `<li>${s}</li>`).join('')}</ul>
                    </div>
                    <div class="detail-card">
                        <h3>Refurbishment Metrics</h3>
                        <ul>
                            <li><strong>RAM Slots:</strong> ${model.refurb.slots}</li>
                            <li><strong>Max Capacity:</strong> ${model.refurb.maxRam}</li>
                        </ul>
                        ${model.refurb.quirk ? `<div class="quirk"><strong>Technician Note:</strong> ${model.refurb.quirk}</div>` : ''}
                    </div>
                    <div class="detail-card">
                        <h3>Strict Hardware Sharing</h3>
                        <ul>${model.parts.map(p => `<li>${p}</li>`).join('')}</ul>
                    </div>
                    <div class="detail-card">
                        <h3>Firmware / BIOS Operations</h3>
                        <ul>${model.bios.map(b => `<li>${b.desc} ${getDiffTag(b.diff)}</li>`).join('')}</ul>
                    </div>
                </div>
            `;
            document.getElementById('detail-view').innerHTML = html;
        }

        function renderList() {
            const list = document.getElementById('model-list');
            list.innerHTML = '';
            
            inventoryData[currentSeries].forEach(model => {
                const btn = document.createElement('button');
                btn.className = `model-btn ${currentModel === model.id ? 'active' : ''}`;
                btn.textContent = model.name;
                btn.onclick = () => renderDetails(model.id);
                list.appendChild(btn);
            });
        }

        renderList();
    </script>
</body>
</html>
