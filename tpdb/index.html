<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <meta name="color-scheme" content="dark">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TP RefurbDB">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>ThinkPad Technician Console</title>
    <style>
        :root {
            --bg-base: #0d1117;
            --bg-surface: #161b22;
            --bg-card: #21262d;
            --border-muted: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --tp-red: #da291c;
            --tp-red-hover: #ff473d;
            --badge-blue: rgba(56, 139, 253, 0.15);
            --badge-blue-text: #58a6ff;
            --badge-orange: rgba(210, 153, 34, 0.15);
            --badge-orange-text: #e3b341;
            --badge-green: rgba(63, 185, 80, 0.15);
            --badge-green-text: #3fb950;
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --sal: env(safe-area-inset-left, 0px);
            --sar: env(safe-area-inset-right, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; }
        body {
            background-color: var(--bg-base); color: var(--text-main);
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            overscroll-behavior: none;
        }
        button { touch-action: manipulation; user-select: none; -webkit-user-select: none; }

        /* ============ HEADER ============ */
        header {
            background-color: var(--bg-surface); border-bottom: 1px solid var(--border-muted);
            padding: calc(0.75rem + var(--sat)) calc(1rem + var(--sar)) 0.75rem calc(1rem + var(--sal));
            display: flex; flex-direction: column; gap: 0.65rem; flex-shrink: 0;
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; }
        .logo { font-size: 1.1rem; font-weight: 700; color: #fff; white-space: nowrap; }
        .logo span { color: var(--tp-red); }

        .series-filters { display: flex; gap: 0.4rem; overflow-x: auto; scrollbar-width: none; }
        .series-filters::-webkit-scrollbar { display: none; }
        .series-filters button {
            background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-muted);
            padding: 0.45rem 0.85rem; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
        }
        .series-filters button:hover { color: var(--text-main); border-color: var(--text-muted); }
        .series-filters button.active { background-color: rgba(218, 41, 28, 0.1); color: var(--tp-red); border-color: var(--tp-red); }

        .search-bar {
            background: var(--bg-base); border: 1px solid var(--border-muted); color: var(--text-main);
            padding: 0.6rem 1rem; border-radius: 8px; width: 100%; outline: none; transition: border 0.2s;
            font-size: 16px; /* prevents iOS auto-zoom on focus */
            -webkit-appearance: none; appearance: none;
        }
        .search-bar:focus { border-color: var(--tp-red); }
        .search-bar::placeholder { color: var(--text-muted); }

        /* ============ LAYOUT ============ */
        main { display: flex; flex: 1; overflow: hidden; position: relative; }

        aside {
            width: 290px; background-color: var(--bg-surface); border-right: 1px solid var(--border-muted);
            overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; flex-shrink: 0;
            padding-bottom: var(--sab); padding-left: var(--sal);
        }

        .list-meta {
            padding: 0.6rem 1.25rem; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); border-bottom: 1px solid var(--border-muted); background: var(--bg-base);
            position: sticky; top: 0; z-index: 2;
        }

        .model-btn {
            background: transparent; color: var(--text-main); border: none; border-bottom: 1px solid var(--border-muted);
            padding: 0.75rem 1.1rem; text-align: left; cursor: pointer; font-size: 0.95rem; font-weight: 500;
            transition: background 0.1s; display: flex; align-items: center; gap: 0.75rem;
            min-height: 56px;
        }
        .model-btn:active { background-color: var(--bg-card); }
        .model-btn:hover { background-color: var(--bg-card); }
        .model-btn.active { background-color: var(--bg-card); border-left: 3px solid var(--tp-red); color: #fff; font-weight: 600; padding-left: calc(1.1rem - 3px); }
        .model-btn .meta { flex: 1; min-width: 0; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .model-btn .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .model-btn .sub { color: var(--text-muted); font-size: 0.78rem; font-weight: 500; white-space: nowrap; }
        .model-btn .chev { display: none; color: var(--text-muted); font-size: 1.2rem; }
        .model-thumb {
            width: 52px; height: 39px; flex-shrink: 0; border-radius: 5px;
            border: 1px solid var(--border-muted); background: var(--bg-base);
            overflow: hidden; display: grid; place-items: center; position: relative;
        }
        .model-thumb > * { grid-area: 1 / 1; }
        .model-thumb img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .model-thumb.has-image img { display: block; }
        .model-thumb.has-image .ph { display: none; }
        .model-thumb .ph { width: 70%; height: auto; opacity: 0.35; fill: var(--text-muted); }

        .content-area {
            flex: 1; padding: 1.5rem; overflow-y: auto; -webkit-overflow-scrolling: touch;
            background-color: var(--bg-base);
            padding-bottom: calc(1.5rem + var(--sab)); padding-right: calc(1.5rem + var(--sar));
        }

        .empty-state { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; padding: 1rem; }

        /* Mobile back bar — hidden on desktop */
        .mobile-bar { display: none; }

        /* ============ DETAIL ============ */
        .model-hero {
            margin-bottom: 1.5rem; padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-muted);
        }
        .image-dropdown {
            margin-bottom: 1rem; border: 1px solid var(--border-muted);
            border-radius: 8px; background: var(--bg-surface); overflow: hidden;
        }
        .image-dropdown-toggle {
            width: 100%; display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem; padding: 0.8rem 1rem; background: rgba(218, 41, 28, 0.08); border: none;
            color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-align: left;
            min-height: 52px;
        }
        .image-dropdown-toggle:hover { background: rgba(218, 41, 28, 0.12); }
        .image-dropdown-toggle:active { background: var(--bg-card); }
        .image-dropdown-toggle .toggle-left { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
        .image-dropdown-toggle .toggle-hint {
            font-size: 0.72rem; font-weight: 500; color: var(--text-muted); letter-spacing: 0.2px;
        }
        .image-dropdown-toggle .chev {
            color: var(--text-muted); font-size: 1.15rem; transition: transform 0.18s ease;
            line-height: 1; flex-shrink: 0;
        }
        .image-dropdown.open .image-dropdown-toggle .chev { transform: rotate(90deg); }
        .image-dropdown-panel {
            display: none; border-top: 1px solid var(--border-muted); padding: 0.85rem;
        }
        .image-dropdown.open .image-dropdown-panel { display: block; }
        .model-photo {
            aspect-ratio: 4 / 3; max-width: 560px; margin: 0 auto; border-radius: 8px;
            border: 1px solid var(--border-muted);
            background:
                linear-gradient(145deg, rgba(218, 41, 28, 0.06), transparent 40%),
                var(--bg-base);
            overflow: hidden; position: relative; display: grid; place-items: center;
        }
        .model-photo img {
            width: 100%; height: 100%; object-fit: contain; background: #0a0d12;
            display: none; position: absolute; inset: 0;
        }
        .model-photo.has-image img { display: block; }
        .model-photo .photo-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.55rem; color: var(--text-muted); text-align: center; padding: 1rem;
            width: 100%; height: 100%;
        }
        .model-photo .photo-placeholder svg { width: 56%; max-width: 140px; opacity: 0.45; fill: var(--text-muted); }
        .model-photo .photo-placeholder span {
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.9px; font-weight: 600;
        }
        .model-photo.has-image .photo-placeholder { display: none; }

        .dashboard-header { min-width: 0; }
        .dashboard-header h2 { font-size: 2rem; color: #fff; letter-spacing: -0.8px; font-weight: 700; line-height: 1.15; }
        .dashboard-header .size-line { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.35rem; }

        .badge-group { display: flex; gap: 0.4rem; margin-top: 0.75rem; flex-wrap: wrap; }
        .badge { padding: 0.22rem 0.65rem; border-radius: 6px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.45px; }
        .b-cpu { background: var(--badge-blue); color: var(--badge-blue-text); border: 1px solid rgba(56, 139, 253, 0.4); }
        .b-ram { background: var(--badge-orange); color: var(--badge-orange-text); border: 1px solid rgba(210, 153, 34, 0.4); }
        .b-tier { background: var(--badge-green); color: var(--badge-green-text); border: 1px solid rgba(63, 185, 80, 0.4); }

        /* Stat strip: Max RAM / Libreboot / Modularity */
        .stat-strip { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.65rem; margin-top: 1rem; }
        .stat { background: var(--bg-surface); border: 1px solid var(--border-muted); border-radius: 8px; padding: 0.6rem 0.8rem; }
        .stat .stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-weight: 700; }
        .stat .stat-val { font-weight: 700; color: #fff; font-size: 0.92rem; margin-top: 3px; line-height: 1.3; }
        .stat .stat-note { font-size: 0.74rem; color: var(--text-muted); margin-top: 4px; line-height: 1.35; }
        .lb-classic .stat-val { color: var(--badge-green-text); }
        .lb-modern .stat-val { color: var(--badge-blue-text); }
        .lb-none .stat-val { color: var(--text-muted); }
        .mod-bar { display: flex; gap: 3px; margin-top: 7px; }
        .mod-seg { height: 6px; flex: 1; border-radius: 2px; background: var(--border-muted); }
        .mod-seg.on { background: var(--tp-red); }
        .mod-hi .mod-seg.on { background: var(--badge-green-text); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(380px, 100%), 1fr)); gap: 1rem; }

        .card {
            background: var(--bg-surface); border: 1px solid var(--border-muted); border-radius: 10px;
            padding: 1.1rem 1.15rem;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card-content { flex-grow: 1; }
        .card-header {
            display: flex; align-items: center; gap: 0.65rem; margin-bottom: 0.85rem; color: #fff;
            font-size: 0.95rem; font-weight: 600; border-bottom: 1px solid var(--border-muted); padding-bottom: 0.5rem;
        }
        .card-header svg { fill: var(--text-muted); width: 18px; height: 18px; flex-shrink: 0; }

        ul.tech-list { list-style: none; }
        ul.tech-list li { margin-bottom: 0.65rem; padding-left: 1.25rem; position: relative; font-size: 0.9rem; color: var(--text-main); line-height: 1.45; }
        ul.tech-list li:last-child { margin-bottom: 0; }
        ul.tech-list li::before { content: "\203A"; color: var(--tp-red); position: absolute; left: 0; font-size: 1.15rem; font-weight: bold; top: -2px; }
        ul.fault-list li::before { content: "\26A0"; font-size: 0.8rem; top: 1px; color: var(--badge-orange-text); }

        .alert-box {
            background: rgba(218, 41, 28, 0.08); border: 1px solid rgba(218, 41, 28, 0.15); border-left: 3px solid var(--tp-red);
            padding: 0.85rem 0.95rem; border-radius: 0 6px 6px 0; margin-top: 0.9rem; font-size: 0.86rem; line-height: 1.5;
        }
        .alert-box strong { color: #fff; }
        .value-box {
            background: rgba(63, 185, 80, 0.06); border: 1px solid rgba(63, 185, 80, 0.15); border-left: 3px solid var(--badge-green-text);
            padding: 0.85rem 0.95rem; border-radius: 0 6px 6px 0; margin-top: 0.75rem; font-size: 0.86rem; line-height: 1.5;
        }
        .value-box strong { color: #fff; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-muted); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ============ DESKTOP (>= 900px) ============ */
        @media (min-width: 900px) {
            header { flex-direction: row; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; }
            .header-row { flex: 1; justify-content: flex-end; }
            .logo { font-size: 1.2rem; }
            .search-bar { width: 300px; }
            .content-area { padding: 2rem; }
            .dashboard-header h2 { font-size: 2.2rem; }
            .model-photo { max-width: 640px; }
        }

        /* ============ MOBILE (< 900px): two-view navigation ============ */
        @media (max-width: 899px) {
            aside { width: 100%; border-right: none; }
            .model-btn { padding: 0.7rem 1rem; }
            .model-btn.active { padding-left: calc(1rem - 3px); }
            .model-btn .chev { display: block; }

            .content-area {
                position: absolute; inset: 0; z-index: 5;
                transform: translateX(100%);
                transition: transform 0.22s ease;
                padding: 1rem; padding-bottom: calc(1.5rem + var(--sab));
                will-change: transform;
                visibility: hidden;
            }
            body.detail-open .content-area { transform: translateX(0); visibility: visible; }

            .mobile-bar {
                display: flex; align-items: center; gap: 0.5rem;
                position: sticky; top: -1rem; margin: -1rem -1rem 1rem -1rem;
                padding: 0.6rem 1rem;
                background: rgba(13, 17, 23, 0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
                border-bottom: 1px solid var(--border-muted); z-index: 10;
            }
            .back-btn {
                background: var(--bg-card); border: 1px solid var(--border-muted); color: var(--text-main);
                padding: 0.5rem 0.9rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
                display: flex; align-items: center; gap: 0.35rem; min-height: 40px;
            }
            .back-btn:active { background: var(--border-muted); }
            .mobile-bar .bar-title { font-weight: 700; color: #fff; font-size: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

            .model-hero { margin-bottom: 1.15rem; }
            .model-photo { max-width: 100%; }
            .dashboard-header h2 { font-size: 1.65rem; }
            .stat-strip { grid-template-columns: 1fr; }
            .card { padding: 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .content-area { transition: none; }
            .image-dropdown-toggle .chev { transition: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-row">
            <div class="logo">ThinkPad<span>Refurb</span>DB</div>
            <div class="series-filters">
                <button id="btn-t" class="active" onclick="setSeries('T')">T-Series</button>
                <button id="btn-x" onclick="setSeries('X')">X-Series</button>
                <button id="btn-w" onclick="setSeries('W')">W/P-Series</button>
            </div>
        </div>
        <input type="text" id="search" class="search-bar" placeholder="Search models, parts, faults (e.g., 2Rx8, coreboot)..."
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               onkeyup="handleSearch()" oninput="handleSearch()">
    </header>

    <main>
        <aside id="model-list"></aside>
        <section class="content-area" id="detail-view">
            <div class="empty-state">Select a ThinkPad from the list to view hardware notes and photos.</div>
        </section>
    </main>

    <script>
        const icons = {
            hw: `<svg viewBox="0 0 24 24"><path d="M2 4h20v16H2V4zm2 2v12h16V6H4zm3 2h2v2H7V8zm0 4h2v2H7v-2zm4-4h6v2h-6V8zm0 4h6v2h-6v-2z"/></svg>`,
            fw: `<svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18-.21 0-.41-.06-.57-.18l-7.9-4.44A.991.991 0 0 1 3 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18.21 0 .41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9zM12 4.15L6.04 7.5 12 10.85l5.96-3.35L12 4.15zM5 15.91l6 3.38v-6.71L5 9.21v6.7zM19 9.21l-6 3.38v6.71l6-3.38v-6.7z"/></svg>`,
            parts: `<svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>`,
            os: `<svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>`,
            fault: `<svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 4.5L19.5 19h-15L12 6.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>`,
            display: `<svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>`,
            laptop: `<svg viewBox="0 0 64 48" aria-hidden="true"><path d="M8 8h48a3 3 0 0 1 3 3v24a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V11a3 3 0 0 1 3-3zm2 4v20h44V12H10zm-6 28h56v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2z"/><rect x="14" y="16" width="36" height="12" rx="1" opacity="0.35"/></svg>`
        };

        const IMAGE_VER = '6';
        const KNOWN_PHOTOS = new Set(['t420', 'x200', 'x201', 'x220', 'x230']);

        function imagePath(model) {
            const base = model.image || `./images/${model.id}.jpg`;
            const sep = base.includes('?') ? '&' : '?';
            return `${base}${sep}v=${IMAGE_VER}`;
        }

        function markImageLoaded(img) {
            const wrap = img.parentElement;
            if (wrap) wrap.classList.add('has-image');
            const dropdown = img.closest('.image-dropdown');
            if (dropdown) {
                dropdown.classList.add('has-photo');
                const hint = dropdown.querySelector('.toggle-hint');
                if (hint) hint.textContent = 'Tap to show / hide';
            }
        }

        function thumbMarkup(model) {
            const src = imagePath(model);
            return `<span class="model-thumb" aria-hidden="true">
                ${icons.laptop.replace('<svg', '<svg class="ph"')}
                <img src="${src}" alt="" loading="lazy" decoding="async"
                     onload="markImageLoaded(this)"
                     onerror="this.remove()">
            </span>`;
        }

        function photoMarkup(model) {
            const src = imagePath(model);
            const hint = KNOWN_PHOTOS.has(model.id)
                ? 'Loading photo\u2026'
                : `No photo yet \u2014 add images/${model.id}.jpg`;
            return `<div class="model-photo" id="photo-${model.id}">
                <div class="photo-placeholder">
                    ${icons.laptop}
                    <span>${hint}</span>
                </div>
                <img data-src="${src}" alt="${model.name}" decoding="async"
                     onload="markImageLoaded(this)"
                     onerror="photoLoadError(this)">
            </div>`;
        }

        function photoLoadError(img) {
            const wrap = img.parentElement;
            img.remove();
            if (!wrap) return;
            const span = wrap.querySelector('.photo-placeholder span');
            if (span) span.textContent = 'No photo for this model yet';
        }

        function toggleModelImage(btn) {
            const dropdown = btn.closest('.image-dropdown');
            if (!dropdown) return;
            const open = dropdown.classList.toggle('open');
            btn.setAttribute('aria-expanded', open ? 'true' : 'false');
            if (open) {
                const img = dropdown.querySelector('.model-photo img[data-src]');
                if (img && !img.getAttribute('src')) {
                    img.src = img.getAttribute('data-src');
                }
            }
        }

        const db = {
        "T": [
                {
                        "id": "t580",
                        "image": "./images/t580.jpg",                        "name": "T580",
                        "tags": [
                                "15.6-inch",
                                "Quad-Core",
                                "DDR4",
                                "Tier A"
                        ],
                        "specs": [
                                "Intel 8th Gen Core (i5-8250U / i5-8350U / i7-8550U / i7-8650U, quad-core ULV)",
                                "Optional Nvidia MX150 2GB dGPU (usually paired with UHD panel SKUs)",
                                "15.6-inch HD TN / FHD IPS (touch and non-touch) / UHD IPS options",
                                "2.5-inch SATA bay; M.2 2280 NVMe via adapter tray FRU; M.2 2242 possible in WWAN slot",

        let currentSeries = 'T';
        let allModels = [];

        Object.keys(db).forEach(key => {
            db[key].forEach(model => allModels.push({...model, series: key}));
        });

        const isMobile = () => window.matchMedia('(max-width: 899px)').matches;

        /* ---- mobile two-view navigation with hardware-back support ---- */
        function openDetail() {
            if (isMobile() && !document.body.classList.contains('detail-open')) {
                document.body.classList.add('detail-open');
                try { history.pushState({ tpdbDetail: true }, ''); } catch (e) {}
            }
        }
        function closeDetail() {
            if (history.state && history.state.tpdbDetail) {
                history.back(); // popstate handler does the class removal
            } else {
                document.body.classList.remove('detail-open');
            }
        }
        window.addEventListener('popstate', () => {
            document.body.classList.remove('detail-open');
        });

        function setSeries(series) {
            currentSeries = series;
            document.getElementById('search').value = '';
            document.querySelectorAll('.series-filters button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${series.toLowerCase()}`).classList.add('active');
            renderList(db[series]);
        }

        function handleSearch() {
            const query = document.getElementById('search').value.toLowerCase();
            if (!query) return setSeries(currentSeries);

            document.querySelectorAll('.series-filters button').forEach(b => b.classList.remove('active'));
            const results = allModels.filter(m =>
                m.name.toLowerCase().includes(query) ||
                (m.maxram || '').toLowerCase().includes(query) ||
                ((m.libreboot && m.libreboot.status !== 'none') ? 'libreboot yes ' + m.libreboot.note : 'libreboot no').toLowerCase().includes(query) ||
                m.specs.join(' ').toLowerCase().includes(query) ||
                m.parts.join(' ').toLowerCase().includes(query) ||
                m.refurb.toLowerCase().includes(query) ||
                (m.value || '').toLowerCase().includes(query) ||
                m.tags.join(' ').toLowerCase().includes(query) ||
                m.firmware.join(' ').toLowerCase().includes(query) ||
                (m.display || []).join(' ').toLowerCase().includes(query) ||
                (m.faults || []).join(' ').toLowerCase().includes(query) ||
                m.os.join(' ').toLowerCase().includes(query)
            );
            renderList(results);
        }

        function renderList(models) {
            const list = document.getElementById('model-list');
            list.innerHTML = '';

            const meta = document.createElement('div');
            meta.className = 'list-meta';
            meta.textContent = `${models.length} model${models.length === 1 ? '' : 's'}`;
            list.appendChild(meta);

            models.forEach(model => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.innerHTML = `${thumbMarkup(model)}<span class="meta"><span class="name">${model.name}</span><span class="sub">${model.tags[0]} <span class="chev">\u203A</span></span></span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderDetails(model);
                    openDetail();
                };
                list.appendChild(btn);
            });
        }

        function renderDetails(model) {
            const tierTag = model.tags[3] ? `<span class="badge b-tier">${model.tags[3]}</span>` : '';
            const lb = model.libreboot || { status: 'none', note: '' };
            const lbLabel = lb.status === 'classic' ? 'Yes \u2014 official classic target'
                          : lb.status === 'modern' ? 'Yes \u2014 recent releases'
                          : 'No';
            const modScore = model.modularity || 0;
            const modSegs = Array.from({length: 10}, (_, i) => `<span class="mod-seg${i < modScore ? ' on' : ''}"></span>`).join('');
            const statStrip = `
                <div class="stat-strip">
                    <div class="stat">
                        <div class="stat-label">Max RAM</div>
                        <div class="stat-val">${model.maxram || '\u2014'}</div>
                    </div>
                    <div class="stat lb-${lb.status}">
                        <div class="stat-label">Libreboot</div>
                        <div class="stat-val">${lbLabel}</div>
                        <div class="stat-note">${lb.note}</div>
                    </div>
                    <div class="stat${modScore >= 8 ? ' mod-hi' : ''}">
                        <div class="stat-label">Modularity</div>
                        <div class="stat-val">${modScore}/10</div>
                        <div class="mod-bar">${modSegs}</div>
                    </div>
                </div>`;
            const html = `
                <div class="mobile-bar">
                    <button class="back-btn" onclick="closeDetail()">\u2039 Models</button>
                    <span class="bar-title">${model.name}</span>
                </div>
                <div class="model-hero">
                    <div class="image-dropdown${KNOWN_PHOTOS.has(model.id) ? ' has-photo' : ''}" id="image-dropdown-${model.id}">
                        <button type="button" class="image-dropdown-toggle"
                                aria-expanded="false" aria-controls="image-panel-${model.id}"
                                onclick="toggleModelImage(this)">
                            <span class="toggle-left">
                                <span>Model Image</span>
                                <span class="toggle-hint">${KNOWN_PHOTOS.has(model.id) ? 'Tap to show / hide' : 'No photo uploaded yet'}</span>
                            </span>
                            <span class="chev" aria-hidden="true">\u203A</span>
                        </button>
                        <div class="image-dropdown-panel" id="image-panel-${model.id}">
                            ${photoMarkup(model)}
                        </div>
                    </div>
                    <div class="dashboard-header">
                        <h2>${model.name}</h2>
                        <div class="size-line">${model.tags[0]}</div>
                        <div class="badge-group">
                            <span class="badge b-cpu">${model.tags[1]}</span>
                            <span class="badge b-ram">${model.tags[2]}</span>
                            ${tierTag}
                        </div>
                        ${statStrip}
                    </div>
                </div>

                <div class="grid-container">
                    <div class="card">
                        <div class="card-content">
                            <div class="card-header">${icons.hw} Technical Architecture & Constraints</div>
                            <ul class="tech-list">
                                ${model.specs.map(s => `<li>${s}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="alert-box">
                            <strong>Refurbishment Metrics:</strong> ${model.refurb}
                        </div>
                        ${model.value ? `<div class="value-box"><strong>Resale Positioning:</strong> ${model.value}</div>` : ''}
                    </div>

                    <div class="card">
                        <div class="card-content">
                            <div class="card-header">${icons.fault} Known Faults & Bench Checks</div>
                            <ul class="tech-list fault-list">
                                ${(model.faults || []).map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-content">
                            <div class="card-header">${icons.parts} Verified Hardware Interchanges</div>
                            <ul class="tech-list">
                                ${model.parts.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-content">
                            <div class="card-header">${icons.fw} Low-Level Firmware & BIOS Operations</div>
                            <ul class="tech-list">
                                ${model.firmware.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-content">
                            <div class="card-header">${icons.display} Display Grades & Upgrade Paths</div>
                            <ul class="tech-list">
                                ${(model.display || []).map(d => `<li>${d}</li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-content">
                            <div class="card-header">${icons.os} OS Deployment & Homelab Viability</div>
                            <ul class="tech-list">
                                ${model.os.map(o => `<li>${o}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;
            const view = document.getElementById('detail-view');
            view.innerHTML = html;
            view.scrollTop = 0;
        }

        setSeries('T');

        /* ---- offline support (works when hosted on GitHub Pages / any HTTPS origin) ---- */
        if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
                    .then(reg => reg.update())
                    .catch(() => {});
            });
        }
    </script>
</body>
</html>
